<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AgeisFIM</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <canvas id="bg-matrix" aria-hidden="true"></canvas>

    <div class="terminal-grid"></div>

    <!-- ── Header ─────────────────────────────────────── -->
    <header>
        <div>
            <span class="terminal-tag">SECURITY MONITOR</span>
            <h1>🛡 AgeisFIM</h1>
        </div>

        <div class="header-status">
            <span class="status-dot"></span>
            <span id="last-scan">Last scan: Never</span>
        </div>
    </header>

    <!-- ── Stat Cards ─────────────────────────────────── -->
    <section class="cards">

        <div class="card">
            <span class="card-label">FILES WATCHED</span>
            <span class="card-value" id="stat-watched">—</span>
        </div>

        <div class="card modified">
            <span class="card-label">MODIFIED</span>
            <span class="card-value" id="stat-modified">—</span>
        </div>

        <div class="card deleted">
            <span class="card-label">DELETED</span>
            <span class="card-value" id="stat-deleted">—</span>
        </div>

        <div class="card added">
            <span class="card-label">ADDED</span>
            <span class="card-value" id="stat-added">—</span>
        </div>

        <div class="card perm">
            <span class="card-label">PERM CHANGES</span>
            <span class="card-value" id="stat-perm">—</span>
        </div>

    </section>

    <!-- ── Action Buttons ─────────────────────────────── -->
    <section class="actions">
        <button id="btn-baseline">📸 Create Baseline</button>
        <button id="btn-check">🔍 Run Check</button>
    </section>

    <!-- ── Status Message ─────────────────────────────── -->
    <div id="status-msg"></div>

    <!-- ── Watch Paths Panel ──────────────────────────── -->
    <section class="watch-paths">

        <div class="panel-header">
            <div>
                <span class="panel-tag">DIRECTORY MONITOR</span>
                <h2>Watch Paths</h2>
            </div>

            <span class="path-count" id="path-count">0 paths</span>
        </div>

        <!-- Add path input -->
        <div class="add-path-row">
            <input
                type="text"
                id="path-input"
                placeholder="e.g. C:\\Users\\YourName\\sensitive or C:\\fim_test" />
            <button id="btn-add-path">＋ Add Path</button>
        </div>

        <ul class="path-list" id="path-list">
            <li class="path-list-empty">No paths configured yet.</li>
        </ul>

    </section>

    <!-- ── Alerts / Results ───────────────────────────── -->
    <section class="alerts">
        <div class="panel-header">
            <div>
                <span class="panel-tag">INTEGRITY</span>
                <h2>Alerts</h2>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Severity</th>
                    <th>Type</th>
                    <th>File</th>
                    <th>Detail</th>
                    <th>When</th>
                </tr>
            </thead>
            <tbody id="alerts-body">
                <tr>
                    <td colspan="5" class="empty">Loading...</td>
                </tr>
            </tbody>
        </table>
    </section>

    <script src="app.js"></script>
</body>
</html>
