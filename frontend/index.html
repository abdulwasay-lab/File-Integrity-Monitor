<!-- frontend/index.html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>FIM Dashboard</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- ── Header ─────────────────────────────────────── -->
    <header>
        <h1>🛡️ File Integrity Monitor</h1>
        <span id="last-scan">Last scan: Never</span>
    </header>

    <!-- ── Stat Cards ─────────────────────────────────── -->
    <section class="cards">

        <div class="card">
            <span class="card-label">Files Watched</span>
            <span class="card-value" id="stat-watched">—</span>
        </div>

        <div class="card modified">
            <span class="card-label">Modified</span>
            <span class="card-value" id="stat-modified">—</span>
        </div>

        <div class="card deleted">
            <span class="card-label">Deleted</span>
            <span class="card-value" id="stat-deleted">—</span>
        </div>

        <div class="card added">
            <span class="card-label">Added</span>
            <span class="card-value" id="stat-added">—</span>
        </div>

        <div class="card perm">
            <span class="card-label">Perm Changes</span>
            <span class="card-value" id="stat-perm">—</span>
        </div>

    </section>

    <!-- ── Action Buttons ─────────────────────────────── -->
    <section class="actions">
        <button id="btn-baseline">📸 Create Baseline</button>
        <button id="btn-check">🔍 Run Check</button>
    </section>

    <!-- ── Status Message ─────────────────────────────── -->
    <div id="status-msg"></div>

    <!-- ── Alerts Table ───────────────────────────────── -->
    <section class="alerts">
        <h2>Recent Alerts</h2>

        <table>
            <thead>
                <tr>
                    <th>Severity</th>
                    <th>Type</th>
                    <th>File</th>
                    <th>Detail</th>
                    <th>Time</th>
                </tr>
            </thead>
            <tbody id="alerts-body">
                <tr>
                    <td colspan="5" class="empty">
                        No alerts yet. Run a check to get started.
                    </td>
                </tr>
            </tbody>
        </table>

    </section>

    <script src="app.js"></script>
</body>
</html>
